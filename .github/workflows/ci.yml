name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler:
          - g++-12
          - clang++-16
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler }} cmake ninja-build

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Check formatting
        run: |
          find src tests benchmarks sample -name '*.cpp' -o -name '*.h' | xargs clang-format --style=file --dry-run --Werror
        continue-on-error: true

      - name: Run clang-tidy
        run: |
          cmake -B build -DCMAKE_CXX_CLANG_TIDY="clang-tidy;--export-fix;--header-filter=.*"
          cmake --build build -j$(nproc)
        continue-on-error: true